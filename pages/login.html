<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - QianlunShop</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script type="module" src="../js/script.js" defer></script>
  <script type="module" src="../js/auth.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <a href="../index.html">
        <img src="../assets/images/icons/QianLun Alphabet.png" alt="QianLun Logo" class="logo-img">
      </a>
    </div>

    <button class="mobile-menu-btn" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul>
      <li><a href="../index.html">Beranda</a></li>
      <li><a href="products.html">Produk</a></li>
      <li>
        <a href="cart.html" id="cartIcon">
          Keranjang <span class="cart-count">0</span>
        </a>
      </li>
      <li><a href="about.html">Tentang</a></li>
      <li><a href="contact.html">Kontak</a></li>
    </ul>
  </nav>

  <!-- Login Section -->
  <section class="auth-page">
    <div class="container">
      <div class="auth-container">
        <div class="auth-image">
          <img src="../assets/images/icons/QianLun Dragon.png" alt="QianLun Dragon" class="auth-dragon">
          <h1>Welcome Back</h1>
          <p>Masuk ke akun Anda untuk melanjutkan perjalanan kemewahan bersama QianlunShop</p>
        </div>

        <div class="auth-form-container">
          <div class="auth-form-wrapper">
            <h2>Masuk ke QianlunShop</h2>

            <form class="auth-form" id="loginForm">
              <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required placeholder="your@email.com" autocomplete="email">
                <div class="error-message" id="loginEmailError"></div>
              </div>

              <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" required placeholder="Password Anda" autocomplete="current-password">
                <div class="error-message" id="loginPasswordError"></div>
              </div>

              <div class="form-options">
                <label class="checkbox-label">
                  <input type="checkbox" id="rememberMe"> Ingat saya
                </label>
                <a href="#" class="forgot-password">Lupa password?</a>
              </div>

              <button type="submit" class="btn btn-primary auth-submit-btn">
                <span class="btn-text">Masuk</span>
                <span class="btn-loading" style="display: none;">⏳</span>
              </button>
            </form>

            <div class="auth-footer">
              <p>Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script>
    // Initialize auth form handlers for standalone page
    document.addEventListener('DOMContentLoaded', function() {
      const loginForm = document.getElementById('loginForm');

      if (loginForm) {
        loginForm.addEventListener('submit', async function(e) {
          e.preventDefault();

          const submitBtn = e.target.querySelector('.auth-submit-btn');
          const btnText = submitBtn.querySelector('.btn-text');
          const btnLoading = submitBtn.querySelector('.btn-loading');

          // Clear errors
          document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
          document.querySelectorAll('input').forEach(input => input.classList.remove('error'));

          const email = document.getElementById('loginEmail').value.trim();
          const password = document.getElementById('loginPassword').value;

          if (!email || !password) {
            showFormError('loginEmail', 'Email dan password wajib diisi');
            return;
          }

          // Show loading
          submitBtn.disabled = true;
          btnText.style.display = 'none';
          btnLoading.style.display = 'inline';

          try {
            // Import userManager dynamically
            const { userManager } = await import('../js/user-manager.js');
            const result = await userManager.login(email, password);

            if (result.success) {
              showToast('Berhasil masuk! Selamat datang kembali.', 'success');
              setTimeout(() => {
                window.location.href = '../index.html';
              }, 1500);
            } else {
              showFormError('loginEmail', result.error);
            }
          } catch (error) {
            console.error('Login error:', error);
            showFormError('loginEmail', 'Terjadi kesalahan. Silakan coba lagi.');
          } finally {
            submitBtn.disabled = false;
            btnText.style.display = 'inline';
            btnLoading.style.display = 'none';
          }
        });
      }

      function showFormError(fieldId, message) {
        const errorEl = document.getElementById(fieldId + 'Error');
        const inputEl = document.getElementById(fieldId);

        if (errorEl) errorEl.textContent = message;
        if (inputEl) inputEl.classList.add('error');
      }

      function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        if (!toast) return;

        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${message}</span>`;
        toast.style.display = 'block';

        setTimeout(() => {
          toast.classList.add('show');
        }, 10);

        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => toast.style.display = 'none', 300);
        }, 3000);
      }
    });
  </script>
</body>
</html>

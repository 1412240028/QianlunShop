<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - QianlunShop</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script type="module" src="../js/script.js" defer></script>
  <script type="module" src="../js/auth.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <a href="../index.html">
        <img src="../assets/images/icons/QianLun Alphabet.png" alt="QianLun Logo" class="logo-img">
      </a>
    </div>

    <button class="mobile-menu-btn" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul>
      <li><a href="../index.html">Beranda</a></li>
      <li><a href="products.html">Produk</a></li>
      <li>
        <a href="cart.html" id="cartIcon">
          Keranjang <span class="cart-count">0</span>
        </a>
      </li>
      <li><a href="about.html">Tentang</a></li>
      <li><a href="contact.html">Kontak</a></li>
    </ul>
  </nav>

  <!-- Register Section -->
  <section class="auth-page">
    <div class="container">
      <div class="auth-container">
        <div class="auth-image">
          <img src="../assets/images/icons/QianLun Dragon.png" alt="QianLun Dragon" class="auth-dragon">
          <h1>Join the Legacy</h1>
          <p>Bergabunglah dengan komunitas pecinta kemewahan dan dapatkan akses eksklusif ke koleksi terbatas QianlunShop</p>
        </div>

        <div class="auth-form-container">
          <div class="auth-form-wrapper">
            <h2>Daftar Akun QianlunShop</h2>

            <form class="auth-form" id="registerForm">
              <div class="form-row">
                <div class="form-group">
                  <label for="firstName">Nama Depan</label>
                  <input type="text" id="firstName" required placeholder="Nama depan" autocomplete="given-name">
                  <div class="error-message" id="firstNameError"></div>
                </div>
                <div class="form-group">
                  <label for="lastName">Nama Belakang</label>
                  <input type="text" id="lastName" required placeholder="Nama belakang" autocomplete="family-name">
                  <div class="error-message" id="lastNameError"></div>
                </div>
              </div>

              <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" required placeholder="your@email.com" autocomplete="email">
                <div class="error-message" id="registerEmailError"></div>
              </div>

              <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" required placeholder="Minimal 6 karakter" autocomplete="new-password">
                <div class="error-message" id="registerPasswordError"></div>
              </div>

              <div class="form-group">
                <label for="confirmPassword">Konfirmasi Password</label>
                <input type="password" id="confirmPassword" required placeholder="Ulangi password" autocomplete="new-password">
                <div class="error-message" id="confirmPasswordError"></div>
              </div>

              <div class="form-group">
                <label for="phone">Nomor Telepon (Opsional)</label>
                <input type="tel" id="phone" placeholder="+62 xxx xxxx xxxx" autocomplete="tel">
                <div class="error-message" id="phoneError"></div>
              </div>

              <div class="form-options">
                <label class="checkbox-label">
                  <input type="checkbox" id="newsletter" checked>
                  Berlangganan newsletter untuk update eksklusif dan penawaran spesial
                </label>
              </div>

              <button type="submit" class="btn btn-primary auth-submit-btn">
                <span class="btn-text">Daftar Sekarang</span>
                <span class="btn-loading" style="display: none;">⏳</span>
              </button>
            </form>

            <div class="auth-footer">
              <p>Sudah punya akun? <a href="login.html">Masuk sekarang</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script>
    // Initialize auth form handlers for standalone page
    document.addEventListener('DOMContentLoaded', function() {
      const registerForm = document.getElementById('registerForm');

      if (registerForm) {
        registerForm.addEventListener('submit', async function(e) {
          e.preventDefault();

          const submitBtn = e.target.querySelector('.auth-submit-btn');
          const btnText = submitBtn.querySelector('.btn-text');
          const btnLoading = submitBtn.querySelector('.btn-loading');

          // Clear errors
          document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
          document.querySelectorAll('input').forEach(input => input.classList.remove('error'));

          const userData = {
            firstName: document.getElementById('firstName').value.trim(),
            lastName: document.getElementById('lastName').value.trim(),
            email: document.getElementById('registerEmail').value.trim(),
            password: document.getElementById('registerPassword').value,
            confirmPassword: document.getElementById('confirmPassword').value,
            phone: document.getElementById('phone').value.trim(),
            newsletter: document.getElementById('newsletter').checked
          };

          // Validation
          if (!validateRegistrationForm(userData)) {
            return;
          }

          // Show loading
          submitBtn.disabled = true;
          btnText.style.display = 'none';
          btnLoading.style.display = 'inline';

          try {
            // Import userManager dynamically
            const { userManager } = await import('../js/user-manager.js');
            const result = await userManager.register(userData);

            if (result.success) {
              showToast('Akun berhasil dibuat! Mengalihkan ke halaman masuk...', 'success');
              setTimeout(() => {
                window.location.href = 'login.html';
              }, 2000);
            } else {
              showFormError('registerEmail', result.error);
            }
          } catch (error) {
            console.error('Registration error:', error);
            showFormError('registerEmail', 'Terjadi kesalahan. Silakan coba lagi.');
          } finally {
            submitBtn.disabled = false;
            btnText.style.display = 'inline';
            btnLoading.style.display = 'none';
          }
        });
      }

      function validateRegistrationForm(data) {
        if (!data.firstName) {
          showFormError('firstName', 'Nama depan wajib diisi');
          return false;
        }

        if (!data.lastName) {
          showFormError('lastName', 'Nama belakang wajib diisi');
          return false;
        }

        if (!data.email || !data.email.includes('@')) {
          showFormError('registerEmail', 'Format email tidak valid');
          return false;
        }

        if (!data.password || data.password.length < 6) {
          showFormError('registerPassword', 'Password minimal 6 karakter');
          return false;
        }

        if (data.password !== data.confirmPassword) {
          showFormError('confirmPassword', 'Konfirmasi password tidak cocok');
          return false;
        }

        return true;
      }

      function showFormError(fieldId, message) {
        const errorEl = document.getElementById(fieldId + 'Error');
        const inputEl = document.getElementById(fieldId);

        if (errorEl) errorEl.textContent = message;
        if (inputEl) inputEl.classList.add('error');
      }

      function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        if (!toast) return;

        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${message}</span>`;
        toast.style.display = 'block';

        setTimeout(() => {
          toast.classList.add('show');
        }, 10);

        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => toast.style.display = 'none', 300);
        }, 3000);
      }
    });
  </script>
</body>
</html>
